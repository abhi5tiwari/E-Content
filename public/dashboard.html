<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competitive Portal - Dashboard</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/glass.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div class="dashboard-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="dashboard-sidebar">
      <div class="brand-section">
        <div class="brand-logo">Ω</div>
        <div>
          <h3 class="brand-name">PREP&nbsp;&<span>LIBRARY</span></h3>
          <span style="font-size: 0.7rem; letter-spacing: 2px; color: var(--text-light); text-transform: uppercase;">Portal Dashboard</span>
        </div>
      </div>

      <div class="sidebar-profile">
        <div class="profile-avatar" id="user-avatar-initials">U</div>
        <div class="profile-info">
          <div class="profile-name" id="user-display-name">Loading User...</div>
          <div class="profile-role" id="user-display-role">
            <svg viewBox="0 0 24 24" width="12" height="12"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="currentColor" stroke-width="2"></path></svg>
            <span>Role</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-menu" id="role-menu-list">
        <!-- Menu links injected dynamically based on User Role -->
        <div class="spinner flex-center" style="margin: 20px auto; width: 24px; height: 24px;"></div>
      </nav>

      <div class="sidebar-footer">
        <div class="menu-item" onclick="logoutUser()" style="color: var(--danger);">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          <span>Sign Out</span>
        </div>
      </div>
    </aside>

    <!-- Main Workspace -->
    <main class="main-content">
      
      <!-- Top header panel -->
      <header class="dashboard-header">
        <div style="display: flex; align-items: center; gap: 16px;">
          <button class="menu-toggle" id="sidebar-hamburger" onclick="toggleSidebarMobile()">☰</button>
          <div class="header-welcome">
            <h1 id="header-greeting">Welcome back!</h1>
            <p id="current-system-date">Loading system date...</p>
          </div>
        </div>

        <!-- Global Search Bar Integration -->
        <div class="header-search-wrapper" style="position: relative; width: 100%; max-width: 300px; margin-left: 20px;">
          <input type="text" id="global-search-input" class="glass-input" placeholder="Global Search..." oninput="handleGlobalSearchInput()" style="padding-left: 36px; height: 38px; font-size: 0.85rem;" onfocus="handleGlobalSearchInput()">
          <svg style="position: absolute; left: 12px; top: 11px; width: 16px; height: 16px; color: var(--text-light); fill: none; stroke: currentColor; stroke-width: 2;" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          
          <!-- Dropdown results panel -->
          <div class="search-results-dropdown glass-card hidden" id="global-search-dropdown" style="position: absolute; top: 46px; left: 0; width: 100%; max-height: 300px; overflow-y: auto; z-index: 1000; padding: 12px; display: flex; flex-direction: column; gap: 10px; text-align: left; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-sm); box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            <!-- Results populated here -->
          </div>
        </div>

        <div class="header-controls">
          <!-- Notification Button -->
          <button class="notification-btn" id="notif-toggle-btn" onclick="toggleNotificationsPanel()">
            <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <div class="notification-badge hidden" id="unread-notif-dot"></div>
          </button>

          <!-- Notifications Dropdown Overlay -->
          <div class="notifications-dropdown glass-card" id="notifications-tray">
            <div class="notif-header">
              <h4>Notifications</h4>
              <button onclick="markAllNotificationsAsRead()">Clear All</button>
            </div>
            <div class="notif-list" id="notifications-container-list">
              <!-- Notifications list injected via dynamic loading JS -->
            </div>
          </div>

          <!-- Light/Dark Mode Toggle -->
          <button class="theme-toggle-btn" id="dashboard-theme-toggle" title="Toggle theme">
            <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;" viewBox="0 0 24 24" id="theme-sun"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; display: none;" viewBox="0 0 24 24" id="theme-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
        </div>
      </header>

      <!-- Active Content Container -->
      <div class="content-body" id="active-panel-body">
        
        <!-- Dashboard Loading screen -->
        <div class="flex-center" style="flex-grow: 1; flex-direction: column; gap: 16px;">
          <div class="spinner"></div>
          <p style="color: var(--text-secondary); font-weight: 500;">Loading metrics overview...</p>
        </div>

      </div>
    </main>
  </div>

  <!-- ==================== POPUP MODALS SECTION ==================== -->

  <!-- Modal Backdrop Overlay Wrapper -->
  <div class="modal-overlay" id="common-modal-overlay">
    <div class="modal-content glass-card" id="modal-content-container">
      <!-- Modal Contents injected dynamically -->
    </div>
  </div>

  <!-- ==================== ACTIVE QUIZ TAKING ENVIRONMENT ==================== -->
  <div class="active-exam-overlay" id="active-quiz-portal">
    <div class="exam-header">
      <div>
        <h2 id="quiz-portal-exam-title">JEE Mock Paper 1</h2>
        <p id="quiz-portal-exam-meta" style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px;">Subject: Science | Questions: 3 | Marks: 30</p>
      </div>
      <div class="exam-timer">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <span id="quiz-portal-timer">10:00</span>
      </div>
    </div>

    <div class="exam-body">
      <!-- Left side: current question -->
      <div class="question-panel">
        <div class="question-card glass-card" id="quiz-portal-question-card">
          <!-- Question text and option buttons -->
        </div>
      </div>

      <!-- Right side: Nav box -->
      <div class="navigation-panel glass-card">
        <h4 style="font-weight: 700; margin-bottom: 12px;">Exam Navigator</h4>
        <div class="nav-grid" id="quiz-portal-nav-grid">
          <!-- Question grid boxes -->
        </div>
        <div style="font-size: 0.85rem; color: var(--text-secondary); display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border-color); padding-top: 16px;">
          <div style="display: flex; align-items: center; gap: 8px;"><div style="width: 12px; height: 12px; border-radius: 2px; background: rgba(16, 185, 129, 0.2); border: 1px solid var(--success);"></div> Answered</div>
          <div style="display: flex; align-items: center; gap: 8px;"><div style="width: 12px; height: 12px; border-radius: 2px; border: 1px solid var(--accent); background: rgba(79, 70, 229, 0.1);"></div> Current Focus</div>
          <div style="display: flex; align-items: center; gap: 8px;"><div style="width: 12px; height: 12px; border-radius: 2px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color);"></div> Not Visited</div>
        </div>
      </div>
    </div>

    <div class="exam-footer">
      <div style="display: flex; gap: 12px;">
        <button class="glass-btn glass-btn-secondary" id="quiz-prev-btn" onclick="quizNavigate('prev')">
          <svg style="width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2;" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
          Previous
        </button>
        <button class="glass-btn glass-btn-secondary" id="quiz-next-btn" onclick="quizNavigate('next')">
          Next
          <svg style="width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2;" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>

      <button class="glass-btn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 0 15px rgba(16, 185, 129, 0.25);" onclick="confirmQuizSubmit()">
        <span>Submit Exam Sheet</span>
        <svg style="width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2;" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </button>
    </div>
  </div>

  <!-- Chart.js local file load -->
  <script src="js/chart.umd.js"></script>
  <!-- API helper -->
  <script src="js/api.js"></script>
  <!-- Authentication Handler -->
  <script src="js/auth.js"></script>
  <!-- Sidebar, theme, dynamic page navigation -->
  <script src="js/dashboard.js"></script>
  <!-- Sub-panel logics -->
  <script src="js/exams.js"></script>
  <script src="js/library.js"></script>
  <script src="js/users.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/examInfo.js"></script>
  <script src="js/syllabus.js"></script>
  <script src="js/studyMaterial.js"></script>
  <script src="js/doubt.js"></script>
  <script src="js/globalSearch.js"></script>
  <script src="js/reports.js"></script>

</body>
</html>
